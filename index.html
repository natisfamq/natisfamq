<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS | Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="loginPage" class="full-screen">
        <div class="glass-container">
            <div class="auth-header">
                <span class="logo-text">NATIS</span>
                <p>Private Cloud Access</p>
            </div>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Login">
                <input type="password" id="userPass" placeholder="Hasło">
            </div>
            <button class="btn-auth" onclick="login()">ENTER</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <nav class="top-nav">
            <div class="nav-content">
                <div class="nav-logo">NATIS // SYSTEM</div>
                <ul class="nav-menu">
                    <li onclick="switchTab('tab-aktywnosc')">Raporty</li>
                    <li onclick="switchTab('tab-pracownicy')">Rodzina</li>
                    <li id="adminTab" style="display:none;" onclick="switchTab('tab-admin')">Panel Zarządzania</li>
                    <li onclick="location.reload()" class="logout-btn">Wyloguj</li>
                </ul>
            </div>
        </nav>

        <div class="main-wrapper">
            <div id="tab-aktywnosc" class="tab-content glass-panel">
                <h2 class="panel-title">Nowy Raport</h2>
                <select id="reportType">
                    <option>Dostawa Materiałów</option>
                    <option>AirDrop</option>
                    <option>Napad</option>
                </select>
                <input type="url" id="reportLink" placeholder="imgur.com/...">
                <button class="btn-action" onclick="sendReport()">Wyślij Dane</button>
            </div>

            <div id="tab-pracownicy" class="tab-content glass-panel" style="display:none;">
                <h2 class="panel-title">Status Członków</h2>
                <table class="data-table">
                    <thead><tr><th>Użytkownik</th><th>Ostatnia Aktywność</th></tr></thead>
                    <tbody id="publicUserList"></tbody>
                </table>
            </div>

            <div id="tab-admin" class="tab-content" style="display:none;">
                <div class="glass-panel">
                    <h2 class="panel-title">Oczekujące Raporty</h2>
                    <div id="adminReportsContainer"></div>
                </div>
                <div class="glass-panel mt-20">
                    <h2 class="panel-title">Baza Kont</h2>
                    <div class="flex-row">
                        <input type="text" id="newUserName" placeholder="Nick">
                        <input type="text" id="newUserPass" placeholder="Hasło">
                        <select id="newUserRole">
                            <option value="USER">Member</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <button class="btn-action" onclick="createUser()">Dodaj do Systemu</button>
                </div>
                <div class="glass-panel mt-20">
                    <h2 class="panel-title">Bezpieczeństwo</h2>
                    <table class="data-table">
                        <thead><tr><th>Nick</th><th>Adres IP</th><th>Akcje</th></tr></thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
