<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS OS | Mono Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <img src="https://i.imgur.com/4E9D9S6.png" class="login-logo" alt="Logo">
            <h2 class="brand">NATIS <span>OS</span></h2>
            <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 20px;">SYSTEM ZARZĄDZANIA</p>
            
            <input type="text" id="userName" placeholder="Identyfikator">
            <input type="password" id="userPass" placeholder="Hasło dostępu">
            <button class="btn-primary" onclick="login()" style="width: 100%;">AUTORYZUJ</button>
            <p id="loginError" class="error"></p>
        </div>
    </div>

    <div id="mainPanel" style="display:none;">
        <nav class="navbar">
            <div class="nav-container">
                <div class="brand">NATIS <span>OS</span></div>
                <div class="menu">
                    <span onclick="switchTab('publicTab')">CZŁONKOWIE</span>
                    <span onclick="switchTab('reportTab')">RAPORT</span>
                    <span id="adminBtn" onclick="switchTab('adminTab')" style="display:none; color: white; border-bottom: 1px solid white;">ZARZĄD</span>
                    <span class="logout" onclick="location.reload()">WYLOGUJ</span>
                </div>
            </div>
        </nav>

        <div class="content">
            
            <div id="publicTab" class="tab-content">
                <div class="card">
                    <h3 style="margin-bottom: 20px;">LISTA AKTYWNYCH JEDNOSTEK</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>KONTO</th><th>ROLA</th></tr>
                        </thead>
                        <tbody id="publicUserList"></tbody>
                    </table>
                </div>
            </div>

            <div id="reportTab" class="tab-content" style="display:none;">
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <h3 style="margin-bottom: 20px;">NOWA DOSTAWA / AKCJA</h3>
                    <select id="reportType" onchange="toggleExtraFields()">
                        <option value="Paczki">Paczki (10,000$)</option>
                        <option value="Cenna">Cenna (10,000$)</option>
                        <option value="Grover">Grover (1,000$ / krzak)</option>
                        <option value="Capt">Capt (Baza + Kille + DMG)</option>
                    </select>

                    <div id="extraFields">
                        <input type="number" id="groverPlants" placeholder="Ilość zebranych krzaków" style="display:none;">
                        <input type="number" id="captKills" placeholder="Ilość killi" style="display:none;">
                        <input type="number" id="captDmg" placeholder="Suma zadanego DMG" style="display:none;">
                    </div>

                    <input type="text" id="reportLink" placeholder="Link Imgur (Dowód)">
                    <button class="btn-primary" onclick="sendReport()" style="width: 100%; margin-top: 10px;">PRZEŚLIJ DO WERYFIKACJI</button>
                </div>
            </div>

            <div id="adminTab" class="tab-content" style="display:none;">
                <div class="card mt-15">
                    <h3>RAPORTY DO ZATWIERDZENIA</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>GRACZ</th><th>KWOTA</th><th>DOWÓD</th><th>AKCJA</th></tr>
                        </thead>
                        <tbody id="adminReportsList"></tbody>
                    </table>
                </div>

                <div class="card mt-15">
                    <h3>LOGI SYSTEMOWE / KONSOLA</h3>
                    <div id="systemLogs" class="logs-viewport"></div>
                    <input type="text" id="adminConsole" placeholder="Terminal command..." onkeypress="handleConsole(event)" class="mt-15">
                </div>

                <div class="card mt-15">
                    <h3>ZARZĄDZANIE DOSTĘPEM</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>USER</th><th>OSTATNIE IP</th><th>USUŃ</th></tr>
                        </thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
