<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natis FamQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <img src="https://i.imgur.com/83p1V6p.png" class="login-logo" alt="NATIS LOGO">
            <h2 class="brand">NATIS <span>OS</span></h2>
            <div style="margin-top: 25px;">
                <input type="text" id="userName" placeholder="Identyfikator">
                <input type="password" id="userPass" placeholder="Hasło dostępu">
                <button class="btn-primary" onclick="login()">AUTORYZUJ</button>
                <p id="loginError" class="error"></p>
            </div>
        </div>
    </div>

    <div id="mainPanel" style="display:none;">
        <nav class="navbar">
            <div class="nav-container">
                <div class="brand">NATIS <span>OS</span></div>
                <div class="menu">
                    <span onclick="switchTab('publicTab')" class="active">CZŁONKOWIE</span>
                    <span onclick="switchTab('reportTab')">RAPORT</span>
                    <span id="adminBtn" onclick="switchTab('adminTab')" style="display:none;">ZARZĄD</span>
                    <span class="logout" onclick="location.reload()">WYLOGUJ</span>
                </div>
            </div>
        </nav>

        <div class="content">
            <div id="publicTab" class="tab-content active-tab">
                <div class="card">
                    <h3 class="section-title">LISTA CZLONKOW</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>KONTO</th><th style="text-align: right;">ROLA</th></tr>
                        </thead>
                        <tbody id="publicUserList"></tbody>
                    </table>
                </div>
            </div>

            <div id="reportTab" class="tab-content">
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <h3 class="section-title">NOWY RAPORT</h3>
                    <select id="reportType" onchange="toggleExtraFields()">
                        <option value="Paczki">Paczki (10,000$)</option>
                        <option value="Cenna">Cenna (10,000$)</option>
                        <option value="Grover">Grover (1,000$ / krzak)</option>
                        <option value="Capt">Capt (Uczestnistwo + Kille + DMG)</option>
                    </select>
                    <div id="extraFields">
                        <input type="number" id="groverPlants" placeholder="Ilość zebranych krzaków" style="display:none;">
                        <input type="number" id="captKills" placeholder="Ilość killi" style="display:none;">
                        <input type="number" id="captDmg" placeholder="Suma zadanego DMG" style="display:none;">
                    </div>
                    <input type="text" id="reportLink" placeholder="Link Imgur (Dowód)">
                    <button class="btn-primary" onclick="sendReport()" style="margin-top: 10px;">PRZEŚLIJ RAPORT</button>
                </div>
            </div>

            <div id="adminTab" class="tab-content">
                <div class="card">
                    <h3 class="section-title">DODAJ CZŁONKA</h3>
                    <div class="form-grid">
                        <input type="text" id="newNick" placeholder="Nick gracza">
                        <input type="text" id="newPass" placeholder="Hasło (min. 6 znaków)">
                        <select id="newRole"></select> <button class="btn-primary" onclick="addNewMember()">DODAJ DO RODZINY</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="section-title">OCZEKUJĄCE RAPORTY</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>GRACZ</th><th>KWOTA</th><th>DOWÓD</th><th style="text-align: right;">AKCJA</th></tr>
                        </thead>
                        <tbody id="adminReportsList"></tbody>
                    </table>
                </div>

                <div class="card">
                    <h3 class="section-title">ZARZĄDZANIE KONTY / AWANSE</h3>
                    <table class="minimal-table">
                        <thead>
                            <tr><th>NICK / ROLA</th><th>IP</th><th style="text-align: right;">AKCJA</th></tr>
                        </thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>

                <div class="card">
                    <h3 class="section-title">KONSOLA SYSTEMOWA</h3>
                    <div id="systemLogs" class="logs-viewport"></div>
                    <input type="text" id="adminConsole" placeholder="Terminal command..." onkeypress="handleConsole(event)" style="margin-top: 15px;">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
