<!DOCTYPE html><html lang="pl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ɴᴀᴛɪs ғᴀᴍǫ ◉ ᴘʀɪᴠᴀᴛᴇ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script></head><body>
    
    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <img src="logo.jpg" alt="NATIS LOGO" class="login-logo">
        
            <div class="brand-large">NATIS <span>FAMQ</span><span class="led-dot"></span></div>
            
            <div class="auth-inputs">
                <input type="text" id="userName" placeholder="użytkownik">
                <input type="password" id="userPass" placeholder="hasło">
                <button class="btn-primary" onclick="login()">ZALOGUJ SYSTEM</button>
            </div>
            <p id="loginError" class="error" style="color: var(--error); font-size: 10px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <nav class="navbar">
            <div class="nav-container">
                <div class="brand">NATIS <span>FAMQ</span><span class="led-dot"></span></div>
                <div class="menu">
                    <span onclick="switchTab('tab-aktywnosc')">Raporty</span>
                    <span onclick="switchTab('tab-pracownicy')">Członkowie</span>
                    <span id="adminTab" style="display:none;" onclick="switchTab('tab-admin')">Admin</span>
                    <span onclick="location.reload()" class="logout">Wyloguj</span>
                </div>
            </div>
        </nav>

        <main class="content">
            <section id="terminalSection" class="card" style="display:none; background: #000; border-color: #ffffff22;">
                <h3 class="card-title" style="color: #fff;">System Console</h3>
                <div id="consoleOutput" class="logs-viewport" style="color: #fff; height: 150px; background: #000; border: none; font-size: 11px;"></div>
                <input type="text" id="consoleInput" placeholder="Wpisz 'help'..." style="background: #050505; border: 1px solid #ffffff33; color: #fff; margin-top: 10px;">
            </section>

            <section id="tab-aktywnosc" class="tab-content card">
                <h3 class="card-title">Nowy Raport</h3>
                <div class="form-group">
                    <select id="reportType" onchange="toggleExtraFields()">
                        <option value="Paczki">Paczki</option>
                        <option value="Cenna">Cenna</option>
                        <option value="Grover">Grover</option>
                        <option value="Capt">Capt</option>
                    </select>
                    <div id="extraFields">
                        <input type="number" id="groverPlants" placeholder="Ilość krzaków" style="display:none;">
                        <input type="number" id="captKills" placeholder="Ilość killi" style="display:none;">
                        <input type="number" id="captDmg" placeholder="DMG" style="display:none;">
                    </div>
                    <input type="text" id="reportLink" placeholder="Link Imgur">
                    <button class="btn-action" onclick="sendReport()">WYŚLIJ RAPORT</button>
                </div>
            </section>

            <section id="tab-pracownicy" class="tab-content card" style="display:none;">
                <h3 class="card-title">Status Rodziny</h3>
                <table class="minimal-table">
                    <thead><tr><th style="width:70%">Konto</th><th style="width:30%; text-align:right;">Rola</th></tr></thead>
                    <tbody id="publicUserList"></tbody>
                </table>
            </section>

            <section id="tab-admin" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Zarządzanie kontami</h3>
                    <table class="minimal-table">
                        <thead><tr><th style="width:30%">User</th><th style="width:40%">IP Address</th><th style="width:30%; text-align:right;">Opcje</th></tr></thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>

                <div class="card mt-15">
                    <h3 class="card-title">Dodaj Nowego Członka</h3>
                    <div class="form-inline">
                        <input type="text" id="newUserName" placeholder="Nick">
                        <div class="pass-wrapper">
                            <input type="text" id="newUserPass" placeholder="Hasło">
                            <button class="dice-btn" onclick="generatePass()">🎲</button>
                        </div>
                        <select id="newUserRole">
                            <option value="Zarząd">Zarząd</option>
                            <option value="Członek">Członek</option>
                        </select>
                        <button class="btn-action" onclick="createUser()">DODAJ KONTO</button>
                    </div>
                </div>

                <div class="card mt-15">
                    <h3 class="card-title">Oczekujące Raporty</h3>
                    <div id="adminReportsContainer"></div>
                </div>

                <div class="card mt-15">
                    <h3 class="card-title">Dziennik Zdarzeń</h3>
                    <div id="systemLogsContainer" class="logs-viewport"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="historyModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3 id="historyTitle" class="card-title">Historia</h3>
            <div id="historyBody"></div>
            <button class="btn-action" style="margin-top:20px" onclick="closeHistory()">ZAMKNIJ OKNO</button>
        </div>
    </div>
    <script src="script.js"></script></body></html>
