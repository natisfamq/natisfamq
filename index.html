<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS FAMQ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Logowanie */
        #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; width: 250px; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; background: #fff; color: #000; border: none; font-weight: bold; border-radius: 5px; }

        /* Panel Główny */
        #mainPanel { display: none; padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo { font-weight: 800; text-transform: uppercase; }
        .logo span { color: #fff; } /* Zmienione z zielonego */
        
        nav a { color: #666; text-decoration: none; margin-left: 20px; font-size: 14px; cursor: pointer; }
        .logout { color: #b00 !important; }

        .status-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 35px; }
        .title { font-size: 22px; font-weight: bold; margin-bottom: 30px; }
        .title span { color: #fff; } /* Zmienione z zielonego */

        table { width: 100%; border-collapse: collapse; }
        th { color: #444; font-size: 12px; text-transform: uppercase; padding-bottom: 15px; text-align: left; }
        .col-role { text-align: right; }
        td { padding: 14px 0; border-top: 1px solid #111; font-size: 15px; color: #ccc; }
        .role-data { text-align: right; } /* Przesunięcie roli pod nagłówek */
        .is-root { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div id="loginPage">
        <h2 style="margin-bottom: 20px;">NATIS FAMQ</h2>
        <input type="text" id="userName" placeholder="Nick">
        <input type="password" id="userPass" placeholder="Hasło">
        <button onclick="login()">Zaloguj</button>
    </div>

    <div id="mainPanel">
        <div class="header">
            <div class="logo">NATIS <span>FAMQ</span></div>
            <nav>
                <a onclick="location.reload()">Raporty</a>
                <a>Członkowie</a>
                <a id="adminTab" style="display:none;">Admin</a>
                <a onclick="location.reload()" class="logout">Wyloguj</a>
            </nav>
        </div>

        <div class="status-card">
            <div class="title">STATUS <span>RODZINY</span></div>
            <table>
                <thead>
                    <tr>
                        <th>KONTO</th>
                        <th class="col-role">ROLA</th>
                    </tr>
                </thead>
                <tbody id="publicUserList">
                    <tr><td colspan="2" style="text-align:center; color:#444;">Wczytywanie...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // Twoja konfiguracja Firebase z obrazka
    const firebaseConfig = {
        apiKey: "AIzaSyDyTpY2vGcvM8sZ5B1TCdDENUObQ6yZF4o",
        authDomain: "natis-ad35.firebaseapp.com",
        databaseURL: "https://natis-ad35-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "natis-ad35",
        storageBucket: "natis-ad35.appspot.com",
        messagingSenderId: "303875422065",
        appId: "1:303875422065:web:c142a191607606e01a28d0"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ROOT_USER = "rex";
    let currentUser = { nick: "", role: "" };

    function getRoleLevel(r) {
        const m = r.match(/^(\d+)/);
        return m ? parseInt(m[1]) : 0;
    }

    async function login() {
        const u = document.getElementById('userName').value;
        const p = document.getElementById('userPass').value;

        if (u === ROOT_USER && p === "Rex1234") {
            setup(u, "Root");
            return;
        }

        db.ref('accounts').once('value', snap => {
            const accs = snap.val();
            let found = false;
            for (let id in accs) {
                if (accs[id].nick === u && accs[id].pass === p) {
                    setup(u, accs[id].role);
                    found = true;
                    break;
                }
            }
            if (!found) alert("Błędne dane logowania!");
        });
    }

    function setup(u, r) {
        currentUser.nick = u;
        currentUser.role = r;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        
        if (u === ROOT_USER || getRoleLevel(r) >= 11) {
            document.getElementById('adminTab').style.display = 'inline';
        }
        renderPublic();
    }

    function renderPublic() {
        db.ref('accounts').on('value', snap => {
            const accs = snap.val() || {};
            let users = [];
            for (let id in accs) { users.push(accs[id]); }
            
            // Sortowanie od najwyższej rangi
            users.sort((a, b) => getRoleLevel(b.role) - getRoleLevel(a.role));

            const list = document.getElementById('publicUserList');
            list.innerHTML = "";
            
            // Dodaj Roota na górę
            list.innerHTML += `<tr class="is-root"><td>${ROOT_USER}</td><td class="role-data">Root</td></tr>`;

            users.forEach(u => {
                if (u.nick === ROOT_USER) return;
                list.innerHTML += `
                    <tr>
                        <td>${u.nick}</td>
                        <td class="role-data">${u.role}</td>
                    </tr>
                `;
            });
        });
    }
</script>
</body>
</html>
