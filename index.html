<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS OS | System Zarządzania</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="loginPage" class="container">
        <div class="login-box">
            <h1 style="letter-spacing: 5px;">NATIS OS</h1>
            <input type="text" id="userName" placeholder="Nick">
            <input type="password" id="userPass" placeholder="Hasło">
            <button onclick="login()">ZALOGUJ SYSTEM</button>
            <p id="loginError" style="color: #ff4d4d; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="mainPanel" class="container" style="display:none;">
        <nav class="menu">
            <span onclick="switchTab('publicTab')">LISTA CZŁONKÓW</span>
            <span onclick="switchTab('reportTab')">NOWY RAPORT</span>
            <span id="adminBtn" onclick="switchTab('adminTab')" style="display:none; color: #f1c40f; font-weight: bold;">ZARZĄDZANIE</span>
        </nav>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div id="publicTab" class="tab-content">
            <h3 class="section-title">CZŁONKOWIE FAMILII</h3>
            <table class="natis-table">
                <thead>
                    <tr><th>NICK / PSEUDONIM</th><th>RANGA W RODZINIE</th></tr>
                </thead>
                <tbody id="publicUserList"></tbody>
            </table>
        </div>

        <div id="reportTab" class="tab-content" style="display:none;">
            <h3 class="section-title">FORMULARZ DOSTAWY / AKCJI</h3>
            <div class="form-card">
                <label>Rodzaj raportu:</label>
                <select id="reportType" onchange="toggleExtraFields()">
                    <option value="Paczki">Paczki (10,000$)</option>
                    <option value="Cenna">Cenna (10,000$)</option>
                    <option value="Grover">Grover (1,000$ / krzak)</option>
                    <option value="Capt">Capt (Baza + Kille + DMG)</option>
                </select>

                <div id="extraFields">
                    <input type="number" id="groverPlants" placeholder="Ilość krzaków" style="display:none;">
                    <input type="number" id="captKills" placeholder="Ilość killi" style="display:none;">
                    <input type="number" id="captDmg" placeholder="Suma DMG" style="display:none;">
                </div>

                <label>Link do dowodu (Imgur):</label>
                <input type="text" id="reportLink" placeholder="https://imgur.com/...">
                <button onclick="sendReport()" class="btn-send">WYŚLIJ DO WERYFIKACJI</button>
            </div>
        </div>

        <div id="adminTab" class="tab-content" style="display:none;">
            <div class="admin-grid">
                <div class="admin-section">
                    <h4 class="section-title">OCZEKUJĄCE RAPORTY</h4>
                    <table class="natis-table">
                        <thead>
                            <tr><th>GRACZ</th><th>KWOTA ($)</th><th>DOWÓD</th><th>AKCJA</th></tr>
                        </thead>
                        <tbody id="adminReportsList"></tbody>
                    </table>
                </div>

                <div class="admin-section">
                    <h4 class="section-title">KONTROLA DOSTĘPU</h4>
                    <table class="natis-table">
                        <thead>
                            <tr><th>NICK / ROLA</th><th>OSTATNIE IP</th><th>AKCJA</th></tr>
                        </thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
            </div>

            <h4 class="section-title" style="margin-top: 30px;">KONSOLA SYSTEMOWA</h4>
            <div id="systemLogs" class="console-box"></div>
            <input type="text" id="adminConsole" placeholder="Wpisz komendę..." onkeypress="handleConsole(event)">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
