<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ɴᴀᴛɪs ғᴀᴍǫ ◉</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .brand span, .card-title span, .logo span { color: #ffffff !important; }
        .status-table th:last-child, #publicUserList td:last-child { text-align: right !important; }
        .led-dot { background: #ffffff !important; box-shadow: 0 0 5px #ffffff !important; }
    </style>
</head>
<body>
    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <img src="logo.jpg" alt="NATIS LOGO" class="login-logo">
            <div class="brand">NATIS <span>FAMQ</span><span class="led-dot"></span></div>
            <div class="auth-inputs">
                <input type="text" id="userName" placeholder="użytkownik">
                <input type="password" id="userPass" placeholder="hasło">
                <button class="btn-primary" onclick="login()">ZALOGUJ SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <nav class="top-nav">
            <div class="brand">NATIS <span>FAMQ</span></div>
            <div class="nav-menu">
                <button class="nav-link active" onclick="switchTab('publicTab')">Status</button>
                <button class="nav-link" onclick="switchTab('membersTab')">Raporty</button>
                <button id="adminTab" class="nav-link" style="display:none;" onclick="switchTab('adminTabContent')">Admin</button>
                <button class="nav-link logout" onclick="location.reload()">Wyloguj</button>
            </div>
        </nav>

        <main class="content-wrapper">
            <section id="publicTab" class="tab-content">
                <div class="card">
                    <h2 class="card-title">STATUS <span>RODZINY</span></h2>
                    <table class="status-table">
                        <thead><tr><th>KONTO</th><th style="text-align: right;">ROLA</th></tr></thead>
                        <tbody id="publicUserList"></tbody>
                    </table>
                </div>
            </section>

            <section id="adminTabContent" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Zarządzanie kontami</h3>
                    <div class="form-group">
                        <input type="text" id="newUserName" placeholder="Nick">
                        <input type="text" id="newUserPass" placeholder="Hasło">
                        <select id="newUserRole"></select> <button class="btn-action" onclick="createUser()">DODAJ KONTO</button>
                    </div>
                </div>

                <div class="card mt-15">
                    <h3 class="card-title">Awansuj / Degraduj</h3>
                    <div class="form-group">
                        <select id="promoteUserList"></select>
                        <select id="promoteNewRole"></select> <button class="btn-action" onclick="promoteUser()">ZMIEŃ RANGĘ</button>
                    </div>
                </div>

                <div class="card mt-15">
                    <h3 class="card-title">Lista Użytkowników</h3>
                    <table class="status-table">
                        <thead><tr><th>NICK</th><th>IP</th><th align="right">AKCJA</th></tr></thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
