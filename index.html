<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ɴᴀᴛɪs ғᴀᴍǫ ◉</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* NAPRAWA KOLORÓW: Zielony na Biały */
        .brand span, .card-title span, .logo span, .status-header span {
            color: #ffffff !important;
        }
        
        /* PRZESUNIĘCIE ROLI POD NAGŁÓWEK (Do prawej) */
        .status-table th:last-child, 
        #publicUserList td:last-child {
            text-align: right !important;
        }

        /* Styl dla klikalnego nicku w Adminie */
        .clickable-nick {
            cursor: pointer;
            text-decoration: underline;
            color: #fff;
        }
        .clickable-nick:hover { color: #ccc; }
    </style>
</head>
<body>
    
    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <div class="brand">NATIS <span>FAMQ</span></div>
            <div class="auth-inputs">
                <input type="text" id="userName" placeholder="użytkownik">
                <input type="password" id="userPass" placeholder="hasło">
                <button class="btn-primary" onclick="login()">ZALOGUJ SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <nav class="top-nav">
            <div class="brand">NATIS <span>FAMQ</span></div>
            <div class="nav-menu">
                <button class="nav-link" onclick="switchTab('publicTab')">Status</button>
                <button class="nav-link" onclick="switchTab('membersTab')">Raporty</button>
                <button id="adminTab" class="nav-link" style="display:none;" onclick="switchTab('adminTabContent')">Admin</button>
                <button class="nav-link logout" onclick="location.reload()">Wyloguj</button>
            </div>
        </nav>

        <main class="content-wrapper">
            <section id="publicTab" class="tab-content">
                <div class="card">
                    <h2 class="card-title">STATUS <span>RODZINY</span></h2>
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>KONTO</th>
                                <th style="text-align: right;">ROLA</th>
                            </tr>
                        </thead>
                        <tbody id="publicUserList"></tbody>
                    </table>
                </div>
            </section>

            <section id="membersTab" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Wyślij Raport</h3>
                    <select id="reportType" onchange="toggleExtraFields()">
                        <option value="Paczki">Paczki</option>
                        <option value="Cenna">Cenna</option>
                        <option value="Grover">Grover</option>
                        <option value="Capt">Capt</option>
                    </select>
                    <input type="number" id="groverPlants" placeholder="Ilość roślin" style="display:none;">
                    <input type="number" id="captKills" placeholder="Kills" style="display:none;">
                    <input type="number" id="captDmg" placeholder="DMG" style="display:none;">
                    <input type="text" id="reportLink" placeholder="Link Imgur">
                    <button class="btn-action" onclick="sendReport()">WYŚLIJ</button>
                </div>
            </section>

            <section id="adminTabContent" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Zarządzanie kontami</h3>
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>NICK / ROLA</th>
                                <th>IP</th>
                                <th style="text-align: right;">AKCJA</th>
                            </tr>
                        </thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
                <div class="card mt-15">
                    <h3 class="card-title">Oczekujące Raporty</h3>
                    <div id="adminReportsContainer"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="historyModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3 id="historyTitle" class="card-title">Historia użytkownika</h3>
            <div id="historyBody" style="max-height: 300px; overflow-y: auto; font-size: 13px;"></div>
            <button class="btn-action" style="margin-top:20px" onclick="closeHistory()">ZAMKNIJ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
