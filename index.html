<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS FAMQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo span { color: #2ecc71; }

        nav a {
            color: #666;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .logout { color: #b00 !important; }

        .status-card {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 35px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .title span { color: #2ecc71; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: #444;
            font-size: 12px;
            text-transform: uppercase;
            padding-bottom: 15px;
            text-align: left;
        }

        td {
            padding: 14px 0;
            border-top: 1px solid #111;
            font-size: 15px;
            color: #ccc;
        }

        .role-data {
            text-align: left;
        }

        .is-root { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">NATIS <span>FAMQ</span></div>
        <nav>
            <a href="#">Raporty</a>
            <a href="#">Członkowie</a>
            <a href="#">Admin</a>
            <a href="#" class="logout">Wyloguj</a>
        </nav>
    </div>

    <div class="status-card">
        <div class="title">STATUS <span>RODZINY</span></div>
        
        <table>
            <thead>
                <tr>
                    <th>KONTO</th>
                    <th>ROLA</th>
                </tr>
            </thead>
            <tbody id="member-list">
                <tr><td colspan="2">Wczytywanie...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadMembers() {
        try {
            const response = await fetch('data.php'); 
            const data = await response.json();
            
            const list = document.getElementById('member-list');
            list.innerHTML = '';

            data.forEach(user => {
                const isRoot = user.role.toLowerCase() === 'root' ? 'is-root' : '';
                list.innerHTML += `
                    <tr class="${isRoot}">
                        <td>${user.username}</td>
                        <td class="role-data">${user.role}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error(error);
        }
    }

    loadMembers();
</script>

</body>
</html>
