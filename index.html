<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS | System Panel</title>
    <link rel="stylesheet" href="style.css"> <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="loginPage" class="container">
        <h2>Panel Systemowy</h2>
        <input type="text" id="userName" placeholder="Login">
        <input type="password" id="userPass" placeholder="Hasło">
        <button onclick="login()">ZALOGUJ SYSTEM</button>
        <p id="loginError" style="color: red; font-size: 12px;"></p>
    </div>

    <div id="mainPanel" class="container" style="display:none;">
        <nav>
            <button onclick="switchTab('tab-aktywnosc')">Aktywność</button>
            <button onclick="switchTab('tab-pracownicy')">Pracownicy</button>
            <button id="adminTab" onclick="switchTab('tab-admin')" style="display:none; color: gold;">ZARZĄD</button>
        </nav>

        <div id="tab-aktywnosc" class="tab-content">
            <h3>Wyślij Raport (IMGUR ONLY)</h3>
            <select id="reportType" onchange="toggleExtraFields()">
                <option value="Paczki">Paczki</option>
                <option value="Cenna">Cenna</option>
                <option value="Grover">Grover</option>
                <option value="Capt">Capt</option>
            </select>
            <input type="text" id="reportLink" placeholder="Link do Imgur">
            <input type="number" id="groverPlants" placeholder="Ilość roślin" style="display:none;">
            <input type="number" id="captKills" placeholder="Zabójstwa" style="display:none;">
            <input type="number" id="captDmg" placeholder="Obrażenia" style="display:none;">
            <button onclick="sendReport()">WYŚLIJ</button>
        </div>

        <div id="tab-pracownicy" class="tab-content" style="display:none;">
            <h3>Lista Pracowników</h3>
            <table width="100%">
                <tbody id="publicUserList"></tbody>
            </table>
        </div>

        <div id="tab-admin" class="tab-content" style="display:none;">
            <div id="consoleWrapper" style="display:none; background:#000; color:#0f0; padding:10px; font-family:monospace; border-radius: 5px; margin-bottom: 20px;">
                <div style="font-size: 10px; color: #555; margin-bottom: 5px;">NATIS_OS_CONSOLE v5.0</div>
                <div id="consoleOutput" style="height:120px; overflow-y:auto; margin-bottom:5px; font-size: 12px;"></div>
                <input type="text" id="consoleInput" placeholder="Wpisz 'help'..." style="width:100%; background:#111; color:#0f0; border:1px solid #333; outline:none; font-family:monospace;">
            </div>

            <h3>Zarządzanie kontami</h3>
            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px;">
                <input type="text" id="newUserName" placeholder="Nick">
                <input type="text" id="newUserPass" placeholder="Hasło">
                <button onclick="generatePass()">LOSUJ</button>
                <select id="newUserRole">
                    <option value="Członek">Członek</option>
                    <option value="Zarząd">Zarząd</option>
                </select>
                <button onclick="createUser()">DODAJ KONTO</button>
            </div>

            <h4>Aktywne konta / Logi IP</h4>
            <table width="100%" id="adminUsersList"></table>

            <h4>Oczekujące raporty</h4>
            <div id="adminReportsContainer"></div>

            <h4>Logi systemowe</h4>
            <div id="systemLogsContainer" style="font-size: 10px; background: #000; padding: 10px; max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="historyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999;">
        <div style="background:#111; padding:20px; width:90%; max-width:500px; border-radius:10px;">
            <h3 id="historyTitle">Historia gracza</h3>
            <div id="historyBody" style="max-height:400px; overflow-y:auto;"></div>
            <button onclick="closeHistory()" style="margin-top:10px;">ZAMKNIJ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
