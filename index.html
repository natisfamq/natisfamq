<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ɴᴀᴛɪs ғᴀᴍǫ ◉</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .brand span, .card-title span, .logo span {
            color: #ffffff !important;
        }
        
        .status-table th:last-child, 
        #publicUserList td:last-child {
            text-align: right !important;
        }

        .led-dot {
            background: #ffffff !important;
            box-shadow: 0 0 5px #ffffff !important;
        }
    </style>
</head>
<body>
    
    <div id="loginPage" class="full-screen">
        <div class="auth-card">
            <img src="logo.jpg" alt="NATIS LOGO" class="login-logo">
            <div class="brand">NATIS <span>FAMQ</span><span class="led-dot"></span></div>
            <div class="auth-inputs">
                <input type="text" id="userName" placeholder="użytkownik">
                <input type="password" id="userPass" placeholder="hasło">
                <button class="btn-primary" onclick="login()">ZALOGUJ SYSTEM</button>
            </div>
            <p id="loginError" class="error"></p>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        <nav class="top-nav">
            <div class="brand">NATIS <span>FAMQ</span></div>
            <div class="nav-menu">
                <button class="nav-link active" onclick="switchTab('publicTab')">Status</button>
                <button class="nav-link" onclick="switchTab('membersTab')">Raporty</button>
                <button id="adminTab" class="nav-link" style="display:none;" onclick="switchTab('adminTabContent')">Admin</button>
                <button class="nav-link logout" onclick="location.reload()">Wyloguj</button>
            </div>
        </nav>

        <main class="content-wrapper">
            <section id="publicTab" class="tab-content">
                <div class="card">
                    <h2 class="card-title">STATUS <span>RODZINY</span></h2>
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>KONTO</th>
                                <th style="text-align: right;">ROLA</th>
                            </tr>
                        </thead>
                        <tbody id="publicUserList">
                            <tr><td colspan="2" class="loading">Wczytywanie...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="membersTab" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Wyślij Raport</h3>
                    <div class="form-group">
                        <select id="reportType" onchange="toggleExtraFields()">
                            <option value="Paczki">Dostawa Paczek</option>
                            <option value="Cenna">Dostawa Cennej</option>
                            <option value="Grover">Grover (Rośliny)</option>
                            <option value="Capt">Przejmowanie (Capt)</option>
                        </select>
                        <input type="number" id="groverPlants" placeholder="Ilość roślin" style="display:none; margin-top: 10px;">
                        <input type="number" id="captKills" placeholder="Kills" style="display:none; margin-top: 10px;">
                        <input type="number" id="captDmg" placeholder="Obrażenia" style="display:none; margin-top: 10px;">
                        <input type="text" id="reportLink" placeholder="Link do Imgur (Dowód)" style="margin-top: 10px;">
                        <button class="btn-action" style="margin-top: 10px;" onclick="sendReport()">WYŚLIJ RAPORT</button>
                    </div>
                </div>
            </section>

            <section id="adminTabContent" class="tab-content" style="display:none;">
                <div class="card">
                    <h3 class="card-title">Zarządzanie</h3>
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>NICK / ROLA</th>
                                <th>IP</th>
                                <th style="text-align: right;">AKCJA</th>
                            </tr>
                        </thead>
                        <tbody id="adminUsersList"></tbody>
                    </table>
                </div>
                <div class="card mt-15">
                    <h3 class="card-title">Oczekujące Raporty</h3>
                    <div id="adminReportsContainer"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="historyModal" class="modal" style="display:none;">
        <div class="modal-content card">
            <h3 id="historyTitle" class="card-title">Historia</h3>
            <div id="historyBody"></div>
            <button class="btn-action" style="margin-top:20px" onclick="closeHistory()">ZAMKNIJ OKNO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
