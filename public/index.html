<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS FAMQ | Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <header class="main-header">
            <div class="header-content">
                <img src="logo.jpg" alt="Logo" class="header-logo">
                <h1 class="header-title">NATIS FAMQ</h1>
            </div>
        </header>
        <button id="login-btn">Zaloguj się przez Discord</button>
    </div>

    <div id="main-app" style="display: none;">
        <header class="main-header">
            <div class="header-content">
                <img src="logo.jpg" alt="Logo" class="header-logo">
                <h1 class="header-title">NATIS FAMQ</h1>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="panel">PANEL</button>
            <button class="tab-btn" data-tab="members">CZŁONKOWIE</button>
            <button class="tab-btn" data-tab="raport">RAPORT</button>
            <button class="tab-btn" data-tab="admin">ADMIN</button>
        </nav>

        <div id="panel" class="tab-content">
            <div class="user-card" id="user-banner-div">
                <div class="user-info-overlay">
                    <img id="user-avatar" src="logo.jpg" alt="Avatar">
                    <div class="user-stats">
                        <h2 id="user-name">Ładowanie...</h2>
                        <p id="user-role-text">Ranga: -</p>
                        <p>Raporty w tym tygodniu: <span id="reports-count">0</span></p>
                        <p>Ostatnia aktywność: <span id="last-act-text">Brak danych</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="members" class="tab-content" style="display: none;">
            <div id="members-list" class="members-grid"></div>
        </div>

        <div id="raport" class="tab-content" style="display: none;">
            <form id="report-form" class="report-box">
                <h3>Wyślij Raport</h3>
                <label>TYP KONTRAKTU</label>
                <select id="contract-type">
                    <option value="paczki">Paczki (10.000$)</option>
                    <option value="cenna">Cenna (10.000$)</option>
                    <option value="grover">Grover (1.000$ / szt)</option>
                    <option value="capt">Capt (Dynamiczny)</option>
                </select>

                <div id="grover-fields" style="display:none;">
                    <label>ILOŚĆ KRZAKÓW</label>
                    <input type="number" id="krzaki-count" value="0">
                </div>

                <div id="capt-fields" style="display:none;">
                    <label>KILLE</label>
                    <input type="number" id="kille-count" value="0">
                    <label>DMG</label>
                    <input type="number" id="dmg-count" value="0">
                </div>

                <label>DOWÓD (LINK IMGUR)</label>
                <input type="text" id="imgur-link" placeholder="imgur.com/...">
                
                <button type="submit" class="btn-submit">WYŚLIJ DO ADMINA</button>
            </form>
        </div>

        <div id="admin" class="tab-content" style="display: none;">
            <h2 class="admin-title">Zarządzanie Raportami</h2>
            <div id="admin-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
