<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIS FAMQ | Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <div id="login-screen">
        <div class="login-wrapper">
            <header class="main-header">
                <div class="header-content">
                    <img src="logo.jpg" alt="Logo" class="header-logo">
                    <h1 class="header-title">NATIS FAMQ</h1>
                </div>
            </header>
            <div class="login-container">
                <button id="login-btn" onclick="window.location.href='/api/login'">Zaloguj się przez Discord</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <header class="main-header">
            <div class="header-content">
                <img src="logo.jpg" alt="Logo" class="header-logo">
                <h1 class="header-title">NATIS FAMQ</h1>
            </div>
        </header>

        <div class="app-container">
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="panel">PANEL</button>
                <button class="tab-btn" data-tab="members">CZŁONKOWIE</button>
                <button class="tab-btn" data-tab="raport">RAPORT</button>
                <button class="tab-btn" data-tab="admin" id="admin-tab-btn" style="display: none;">ADMIN</button>
            </nav>

            <div id="tab-container">
                <div id="panel" class="tab-content active-tab">
                    <div class="glass-card">
                        <div class="profile-layout">
                            <img id="user-avatar" src="logo.jpg" alt="Avatar" class="profile-img">
                            <div class="profile-info">
                                <h2 id="user-name">Użytkownik</h2>
                                <p>Ranga: <span id="user-role-text">-</span></p>
                                <p>Raporty w tym tygodniu: <span id="reports-count">0</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="members" class="tab-content">
                    <div class="glass-card">
                        <h3 class="card-title">CZŁONKOWIE RODZINY</h3>
                        <div id="members-list"></div>
                    </div>
                </div>

                <div id="raport" class="tab-content">
                    <div class="glass-card">
                        <h3 class="card-title">Wyślij Raport</h3>
                        <form id="report-form">
                            <div class="input-group">
                                <label>TYP KONTRAKTU</label>
                                <select id="contract-type">
                                    <option value="paczki">Paczki (10.000$)</option>
                                    <option value="cenna">Cenna (10.000$)</option>
                                    <option value="grover">Grover (1.000$ / szt)</option>
                                    <option value="capt">Capt</option>
                                </select>
                            </div>
                            <div id="grover-fields" style="display:none;">
                                <div class="input-group">
                                    <label>ILOŚĆ KRZAKÓW</label>
                                    <input type="number" id="krzaki-count" value="0">
                                </div>
                            </div>
                            <div id="capt-fields" style="display:none;">
                                <div class="input-group">
                                    <label>KILLE / DMG</label>
                                    <input type="text" id="capt-stats" placeholder="np. 5 / 1200">
                                </div>
                            </div>
                            <div class="input-group">
                                <label>DOWÓD (LINK IMGUR)</label>
                                <input type="text" id="imgur-link" placeholder="https://imgur.com/...">
                            </div>
                            <button type="submit" class="btn-submit">WYŚLIJ RAPORT</button>
                        </form>
                    </div>
                </div>

                <div id="admin" class="tab-content">
                    <div class="glass-card">
                        <h3 class="card-title">Panel Admina</h3>
                        <div id="admin-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
